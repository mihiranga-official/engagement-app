<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/" (click)="closeMobileMenu()">Janith & Shashika</a>
    </div>

    <!-- Desktop Navigation Links -->
    <div class="nav-links-desktop">
      <a *ngIf="showDashboardLink()" routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Dashboard</a>
      <a *ngIf="showGalleryLink()" routerLink="/gallery" routerLinkActive="active-link">Gallery</a>
      <a *ngIf="showGuestWallLink()" routerLink="/guest-wall" routerLinkActive="active-link">Guest Wall</a>
      <a *ngIf="isAdmin()" routerLink="/admin" routerLinkActive="active-link">Admin</a>
    </div>

    <!-- Desktop User Actions -->
    <div class="nav-actions-desktop">
      <span *ngIf="authService.currentUser() as user" class="welcome-msg">
        Welcome, {{ user.name }}
      </span>
      <button *ngIf="authService.currentUser()" (click)="logout(); closeMobileMenu()" class="logout-btn">Logout</button>
      <a *ngIf="!authService.currentUser()" routerLink="/login" class="login-btn">Login</a>
    </div>

    <!-- Mobile Hamburger Menu Button -->
    <button class="hamburger-btn" (click)="toggleMobileMenu()" aria-label="Toggle navigation menu">
      <span class="hamburger-bar" [class.open]="mobileMenuOpen()"></span>
      <span class="hamburger-bar" [class.open]="mobileMenuOpen()"></span>
      <span class="hamburger-bar" [class.open]="mobileMenuOpen()"></span>
    </button>
  </div>

  <!-- Mobile Drawer / Dropdown Menu -->
  <div class="mobile-menu" [class.open]="mobileMenuOpen()">
    <div class="mobile-menu-links">
      <a *ngIf="showDashboardLink()" routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()">Dashboard</a>
      <a *ngIf="showGalleryLink()" routerLink="/gallery" routerLinkActive="active-link" (click)="closeMobileMenu()">Gallery</a>
      <a *ngIf="showGuestWallLink()" routerLink="/guest-wall" routerLinkActive="active-link" (click)="closeMobileMenu()">Guest Wall</a>
      <a *ngIf="isAdmin()" routerLink="/admin" routerLinkActive="active-link" (click)="closeMobileMenu()">Admin</a>
    </div>
    <div class="mobile-menu-actions">
      <span *ngIf="authService.currentUser() as user" class="mobile-welcome-msg">
        Welcome, {{ user.name }}
      </span>
      <button *ngIf="authService.currentUser()" (click)="logout(); closeMobileMenu()" class="mobile-logout-btn">Logout</button>
      <a *ngIf="!authService.currentUser()" routerLink="/login" (click)="closeMobileMenu()" class="mobile-login-btn">Login</a>
    </div>
  </div>
</nav>

<div id="app-content">
  <router-outlet></router-outlet>
</div>

<!-- Inactivity Prompt Overlay -->
<div *ngIf="showInactivityPrompt()" class="inactivity-overlay">
  <div class="inactivity-card">
    <h2>Are you there?</h2>
    <p>We noticed you've been inactive. For your security, you will be automatically logged out in a few seconds.</p>
    <button type="button" (click)="imHere()" class="confirm-btn">
      Yes, I'm here!
    </button>
  </div>
</div>
