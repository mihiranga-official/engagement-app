<div class="min-h-screen flex items-center justify-center bg-stone-50 p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 transform transition-all">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-serif text-stone-800 mb-2">Welcome</h1>
      <p class="text-stone-500 font-light">Join the celebration</p>
    </div>

    <!-- Google Login -->
    <div class="space-y-4">
      <button 
        (click)="loginGoogle()" 
        [disabled]="isLoggingIn"
        class="w-full flex items-center justify-center gap-3 bg-white border border-stone-200 text-stone-700 px-6 py-3 rounded-full hover:bg-stone-50 transition-colors shadow-sm disabled:opacity-50">
        <img src="https://www.google.com/favicon.ico" alt="Google" class="w-5 h-5">
        <span class="font-medium">Continue with Google</span>
      </button>

      <div class="relative flex items-center py-4">
        <div class="flex-grow border-t border-stone-200"></div>
        <span class="flex-shrink-0 mx-4 text-stone-400 text-sm">Or enter as guest</span>
        <div class="flex-grow border-t border-stone-200"></div>
      </div>

      <!-- Guest Login -->
      <div class="space-y-3">
        <input 
          type="text" 
          [(ngModel)]="guestName"
          placeholder="Enter your name" 
          class="w-full px-5 py-3 rounded-xl border border-stone-200 focus:outline-none focus:ring-2 focus:ring-stone-400 focus:border-transparent transition-all"
          (keyup.enter)="loginGuest()"
        />
        <button 
          (click)="loginGuest()"
          [disabled]="!guestName.trim() || isLoggingIn"
          class="w-full bg-stone-800 text-gold-50 text-white px-6 py-3 rounded-full hover:bg-stone-700 transition-colors shadow-md disabled:opacity-50 disabled:cursor-not-allowed font-medium">
          {{ isLoggingIn ? 'Joining...' : 'Join Celebration' }}
        </button>
      </div>
    </div>
  </div>
</div>
